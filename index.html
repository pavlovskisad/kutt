<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A8FCC">
<title>KUTT</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--y:#FFE135;--b:#1A8FCC}
body{font-family:'JetBrains Mono','SF Mono',monospace;background:var(--b);color:var(--y);min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s}
body.R{background:var(--y);color:var(--b)}
button{-webkit-tap-highlight-color:transparent;font-family:inherit;cursor:pointer}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sp{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pi{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

.hd{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.hd img{height:24px;object-fit:contain}
.hd-r{font-size:9px;opacity:.4;display:flex;align-items:center;gap:5px;letter-spacing:.08em}
.hd-dot{width:5px;height:5px;border-radius:50%;background:#30c050}
.tb{display:flex}
.t{flex:1;padding:10px 0;background:none;border:none;border-bottom:3px solid transparent;font-size:11px;font-weight:700;letter-spacing:.08em;font-family:'Space Grotesk',sans-serif;transition:all .3s;opacity:.5}
.t.a{opacity:1}
body:not(.R) .t.a{border-color:var(--y);color:var(--y)}
body:not(.R) .t{color:var(--y)}
body.R .t.a{border-color:var(--b);color:var(--b)}
body.R .t{color:var(--b)}
.vw{position:relative;width:100%;aspect-ratio:4/3;background:#080a08;overflow:hidden}
.vw video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.fstrip{position:absolute;top:0;left:0;right:0;height:50px;width:100%;object-fit:fill;border-radius:4px;opacity:.92;background:rgba(0,0,0,.15);pointer-events:none;display:block}
.fstrip-loading{position:absolute;top:16px;left:0;right:0;text-align:center;font-size:9px;opacity:.5;letter-spacing:.1em;pointer-events:none}
.vo{position:absolute;inset:0;pointer-events:none}
.lb{position:absolute;top:8px;left:10px;display:flex;align-items:center;gap:5px}
.ld{width:7px;height:7px;border-radius:50%;background:#ff3030;animation:lp 1.2s ease-in-out infinite}
.lt{font-size:10px;color:#ff3030;font-weight:600;letter-spacing:.06em}
.rb{position:absolute;inset:0;border:2px solid var(--b)}
.wm{position:absolute;top:8px;right:10px;height:16px;opacity:.35}
.om{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#555;font-size:12px;letter-spacing:.05em}
.kb{width:100%;padding:13px 0;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--y);color:var(--b)}
.ft{font-size:9px;letter-spacing:.1em;font-weight:500;margin-bottom:8px;opacity:.5}
.feed-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cc{border-radius:10px;overflow:hidden;background:#0e2a40;border:1px solid #163a55}
.ct{width:100%;aspect-ratio:4/3;background:#0a1e30;position:relative;overflow:hidden}
.cv{width:100%;height:100%;object-fit:cover;display:block}
.cd{position:absolute;bottom:4px;right:5px;font-size:9px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.55);padding:1px 5px;border-radius:3px}
.ci-row{display:flex;align-items:center;padding:6px 8px;gap:4px}
.ci{flex:1;min-width:0}
.cl{font-size:10px;font-weight:500;color:#ddd;font-family:'Space Grotesk',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ca{font-size:10px;color:#4a6a80;margin-top:0}
.lk{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:0;padding:2px 3px}
.lk svg{width:12px;height:12px}
.lc{font-size:8px;font-variant-numeric:tabular-nums}
.zb{padding:10px 16px 0;display:flex;align-items:center;gap:6px}
.zl{font-size:9px;letter-spacing:.06em;font-weight:500;margin-right:2px;opacity:.5}
.zn{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;font-family:'Space Grotesk',sans-serif;border:none;transition:all .15s}
.zn.a{background:var(--b);color:var(--y)}
.zn:not(.a){background:rgba(26,143,204,.15);color:rgba(26,143,204,.5)}
.tw{padding:6px 16px 0}
.tl{position:relative;height:72px;cursor:pointer;user-select:none;touch-action:none}
.cr{position:absolute;top:0;height:50px;pointer-events:none;z-index:2}
.cri{background:rgba(26,143,204,.35);border-left:3px solid var(--b);border-right:3px solid var(--b);height:100%;position:relative;box-shadow:inset 0 0 0 1px rgba(255,225,53,.25)}
.dl{position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;white-space:nowrap;font-family:'Space Grotesk',sans-serif;color:var(--b);background:var(--y);padding:1px 5px;border-radius:3px;z-index:3}
.hn{position:absolute;top:9px;width:14px;height:32px;background:var(--b);border-radius:4px;box-shadow:0 0 0 2px var(--y)}
.hl{left:-9px}.hr{right:-9px}
.tm{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;padding-top:4px}
.tm span{font-size:9px;font-variant-numeric:tabular-nums;opacity:.35}
.ps{padding:6px 16px 0;display:flex;gap:6px}
.pb{flex:1;padding:9px 0;border-radius:8px;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;transition:all .15s}
.pb.a{background:var(--b);color:var(--y);border:2px solid var(--b)}
.pb:not(.a){background:rgba(26,143,204,.06);color:rgba(26,143,204,.4);border:2px solid rgba(26,143,204,.1)}
.row{padding:14px 16px 0;display:flex;gap:10px;align-items:center}
.pp{width:52px;height:52px;border-radius:50%;border:2.5px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.pp.on{background:var(--b);color:var(--y)}
.pp:not(.on){background:transparent;color:var(--b)}
.ri{flex:1}
.rl{font-size:9px;letter-spacing:.06em;margin-bottom:1px;opacity:.4}
.rv{font-size:17px;font-weight:700;font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums}
.ra{opacity:.2;margin:0 4px;font-size:14px}
.db{padding:6px 12px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;flex-shrink:0;background:var(--b);color:var(--y)}
.sw{padding:12px 16px 0}
.sb{width:100%;padding:14px 0;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s;background:var(--b);color:var(--y)}
.sb:disabled{opacity:.4;cursor:wait}
.sn{width:18px;height:18px;border:2.5px solid rgba(26,143,204,.3);border-top-color:var(--y);border-radius:50%;animation:sp .7s linear infinite}
.sc{text-align:center;padding:20px 16px 8px;animation:su .3s ease-out}
.sk{width:52px;height:52px;border-radius:50%;background:rgba(26,143,204,.15);border:2px solid var(--b);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;animation:pi .4s ease-out;color:var(--b)}
.st{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--b);margin-bottom:3px}
.ss{font-size:11px;opacity:.5;margin-bottom:16px}
.sbt{display:flex;gap:8px;justify-content:center}
.sbt button{font-size:12px;font-weight:600;padding:10px 20px;border-radius:8px;font-family:'Space Grotesk',sans-serif}
.bp{background:var(--b);border:none;color:var(--y)}
.bo{background:transparent;border:1.5px solid var(--b);color:var(--b)}
.fo{text-align:center;padding:20px 0 12px;font-size:9px;opacity:.15;letter-spacing:.04em}
.empty-feed{text-align:center;padding:24px 0;opacity:.3;font-size:11px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:su .2s ease-out}
.modal video{width:100%;max-width:480px;border-radius:10px;background:#000}
.modal-bar{width:100%;max-width:480px;display:flex;gap:8px;padding:12px 0 0;justify-content:center}
.modal-bar button{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;border:none;cursor:pointer}
.modal-save{background:var(--y);color:var(--b);display:flex;align-items:center;gap:6px}
.modal-close{background:rgba(255,255,255,.1);color:#fff}
.modal-name{color:#888;font-size:10px;margin-top:8px;max-width:480px;text-align:center;letter-spacing:.03em}

.archive-btn{width:100%;padding:11px 0;border-radius:10px;border:1.5px solid rgba(255,225,53,.2);background:transparent;color:var(--y);font-size:12px;font-weight:600;font-family:'Space Grotesk',sans-serif;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px;opacity:.6;transition:opacity .2s}
.empty-feed{grid-column:1/-1}
.archive-btn:active{opacity:1}
.archive-back{padding:8px 16px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--y);opacity:.5;cursor:pointer;background:none;border:none;font-family:'Space Grotesk',sans-serif;margin-bottom:4px}
.feed-count{font-size:9px;opacity:.3;text-align:center;margin-top:8px}
.cv{pointer-events:none}.cv::-webkit-media-controls{display:none}</style>
</head>

// === STATE ===
let tab='live',zm=60;
let sAgo=null,eAgo=null;  // clip bounds in seconds-ago-from-live (sAgo > eAgo, sAgo=older, eAgo=newer)
let dragMode=null,dragOffset=0;
let py=false,ex=false,ed=false,eu='',ef='';
let previewTimer=null;
let likedIds=new Set();
let feedClips=[],feedTotal=0,feedOffset=0,feedLoading=false,feedDone=false;
let filmstripUrl='',filmstripLoading=false,filmstripCacheKey='',filmstripLastTime=0;
let hlsR=null,replayReady=false;

// === HELPERS ===
function fs2(s){const a=Math.abs(Math.floor(s));return(s<0?'-':'')+Math.floor(a/60)+':'+String(a%60).padStart(2,'0')}
function fd(s){s=Math.round(s);if(s<60)return s+'s';var m=Math.floor(s/60),r=s%60;return m+'m'+(r?' '+r+'s':'')}
function dur(){return sAgo!==null&&eAgo!==null?Math.abs(sAgo-eAgo):0}
function clipOld(){return sAgo!==null&&eAgo!==null?Math.max(sAgo,eAgo):0}  // older = larger ago = left on timeline
function clipNew(){return sAgo!==null&&eAgo!==null?Math.min(sAgo,eAgo):0}  // newer = smaller ago = right on timeline
function agoToFrac(ago){return Math.max(0,Math.min(1,1-(ago/zm)))}  // 0 ago (now) = 1 (right), zm ago = 0 (left)
function fracToAgo(f){return Math.max(0,Math.min(zm,zm*(1-f)))}

// === HLS (LIVE) ===
const vid=document.getElementById('vid');
const vidR=document.getElementById('vidR');
const om=document.getElementById('om');
let hls=null;
function initHLS(){
  if(Hls.isSupported()){
    hls=new Hls({liveDurationInfinity:true,liveBackBufferLength:1800});
    hls.loadSource(H);hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{vid.play().catch(()=>{});om.style.display='none'});
    hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){om.style.display='flex';setTimeout(()=>{try{hls.destroy()}catch(e){}initHLS()},5000)}});
  }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src=H;vid.play().catch(()=>{});vid.addEventListener('error',()=>{om.style.display='flex';setTimeout(initHLS,5000)});
  }
}
initHLS();
document.addEventListener('click',function(){try{vid.play()}catch(e){}},{once:true});
document.addEventListener('touchstart',function(){try{vid.play()}catch(e){}},{once:true});

// === HLS (REPLAY) ===
function initReplayHLS(cb){
  if(hlsR&&replayReady){if(cb)cb();return}
  if(hlsR){setTimeout(()=>initReplayHLS(cb),100);return}
  if(Hls.isSupported()){
    hlsR=new Hls({liveDurationInfinity:true,liveBackBufferLength:1800,lowLatencyMode:false});
    hlsR.loadSource(H);hlsR.attachMedia(vidR);
    hlsR.on(Hls.Events.MANIFEST_PARSED,()=>{
      // Let it buffer a bit then mark ready
      setTimeout(()=>{replayReady=true;if(cb)cb()},400);
    });
    hlsR.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){try{hlsR.destroy()}catch(e){}hlsR=null;replayReady=false}});
  }else if(vidR.canPlayType('application/vnd.apple.mpegurl')){
    vidR.src=H;
    vidR.addEventListener('loadedmetadata',()=>{replayReady=true;if(cb)cb()},{once:true});
  }
}
function destroyReplayHLS(){
  if(previewTimer){clearInterval(previewTimer);previewTimer=null}
  py=false;
  try{vidR.pause();vidR.removeAttribute('src');vidR.load()}catch(e){}
  if(hlsR){try{hlsR.destroy()}catch(e){}hlsR=null}
  replayReady=false;
}
function seekReplayTo(ago){
  if(!replayReady||!vidR)return;
  try{
    const buf=vidR.buffered;
    if(buf.length===0)return;
    const liveEdge=buf.end(buf.length-1);
    let t=liveEdge-ago;
    const minT=buf.start(0);
    if(t<minT)t=minT;
    if(t>liveEdge-0.1)t=liveEdge-0.1;
    vidR.currentTime=t;
  }catch(e){}
}

// === FILMSTRIP ===
let filmstripLoadToken=0;
function loadFilmstrip(force){
  const key=zm+'';
  if(!force&&filmstripCacheKey===key&&Date.now()-filmstripLastTime<3000)return;
  const myToken=++filmstripLoadToken;
  const targetZm=zm;
  filmstripLoading=true;
  const fl=document.getElementById('fstripLoad');
  if(fl){fl.style.display='';fl.textContent='LOADING FILMSTRIP…'}
  const url=B+'/api/filmstrip?seconds='+targetZm+'&t='+Date.now();
  const img=new Image();
  img.onload=function(){
    if(myToken!==filmstripLoadToken)return;  // stale, ignore
    filmstripUrl=url;filmstripCacheKey=targetZm+'';filmstripLastTime=Date.now();filmstripLoading=false;
    const el=document.getElementById('fstrip');
    if(el)el.src=url;
    if(fl)fl.style.display='none';
  };
  img.onerror=function(){
    if(myToken!==filmstripLoadToken)return;
    filmstripLoading=false;
    if(fl)fl.textContent='FILMSTRIP LOADING… (RETRYING)';
    setTimeout(()=>{if(tab==='replay')loadFilmstrip(true)},3000);
  };
  img.src=url;
}

// === PREVIEW (LOOPING) ===
function togglePreview(){
  if(py){
    py=false;
    try{vidR.pause()}catch(e){}
    if(previewTimer){clearInterval(previewTimer);previewTimer=null}
    rr();return;
  }
  if(dur()<1)return;
  initReplayHLS(function(){
    const oldAgo=clipOld(),newAgo=clipNew();
    const buf=vidR.buffered;
    if(!buf.length)return;
    const liveEdge=buf.end(buf.length-1);
    const startT=liveEdge-oldAgo;
    const endT=liveEdge-newAgo;
    if(startT<buf.start(0)){alert('Clip start not buffered yet — try again in a moment');return}
    try{vidR.currentTime=startT;vidR.play().catch(()=>{})}catch(e){return}
    py=true;rr();
    previewTimer=setInterval(function(){
      if(!py||!vidR)return;
      if(vidR.currentTime>=endT-0.05||vidR.currentTime<startT-0.5){
        try{vidR.currentTime=startT;if(vidR.paused)vidR.play().catch(()=>{})}catch(e){}
      }
    },80);
  });
}

// === FEED ===
async function loadFeed(append){
  if(feedLoading)return;feedLoading=true;
  try{
    if(append){
      var r=await fetch(B+'/api/clips?limit=10&offset='+feedOffset);
      var data=await r.json();
      var nc=data.clips||data;feedTotal=data.total||0;
      if(!nc.length||feedOffset>=feedTotal){feedDone=true}
      else{feedClips=feedClips.concat(nc);feedOffset+=nc.length;if(feedOffset>=feedTotal)feedDone=true}
    }else{
      var cnt=Math.max(10,feedOffset);
      var r=await fetch(B+'/api/clips?limit='+cnt+'&offset=0');
      var data=await r.json();
      var nc=data.clips||data;feedTotal=data.total||0;
      feedClips=nc;feedOffset=nc.length;feedDone=feedOffset>=feedTotal;
    }
    renderFeed();
  }catch(e){}
  feedLoading=false;
}
loadFeed();
setInterval(function(){if(tab==='live')loadFeed()},15000);

// === TAB SWITCH ===
function sw(t){
  if(tab===t)return;
  tab=t;
  document.body.classList.toggle('R',t==='replay');
  document.getElementById('tl').classList.toggle('a',t==='live');
  document.getElementById('tr').classList.toggle('a',t==='replay');
  document.getElementById('pl').style.display=t==='live'?'':'none';
  document.getElementById('pr').style.display=t==='replay'?'':'none';
  document.getElementById('lb').style.display=t==='live'?'':'none';
  document.getElementById('rb').style.display=t==='replay'?'':'none';
  document.getElementById('logo').src=t==='replay'?LB:LY;
  document.getElementById('vw').src=LY;
  document.querySelector('meta[name=theme-color]').content=t==='replay'?'#FFE135':'#1A8FCC';

  if(t==='replay'){
    // Show replay video, pause live
    vidR.style.display='';
    vid.style.display='none';
    try{vid.pause()}catch(e){}
    // Default clip: 10s, centered around 10s ago
    if(sAgo===null){sAgo=15;eAgo=5}
    ed=false;ex=false;py=false;
    // Load filmstrip first (fast), then init replay HLS
    loadFilmstrip(true);
    initReplayHLS(function(){seekReplayTo(clipOld())});
  }else{
    // Destroy replay HLS, resume live
    destroyReplayHLS();
    vidR.style.display='none';
    vid.style.display='';
    sAgo=null;eAgo=null;ed=false;ex=false;
    try{
      if(hls&&vid.duration)vid.currentTime=vid.duration;
      vid.play().catch(()=>{});
    }catch(e){}
  }
  rr();
}

// === ZOOM ===
function sz(z){
  if(z===zm)return;
  zm=z;
  // Clip absolute positions stay the same in seconds-ago, just clamp
  if(sAgo!==null&&eAgo!==null){
    if(sAgo>zm)sAgo=zm;
    if(eAgo>zm)eAgo=zm;
    if(dur()<1){sAgo=Math.min(zm,15);eAgo=Math.min(zm,5)}
  }
  ed=false;
  loadFilmstrip(true);
  rr();
}

// === PRESETS ===
function sp(s){
  const center=(sAgo!==null&&eAgo!==null)?(sAgo+eAgo)/2:10;
  const h=s/2;
  let newS=center+h,newE=center-h;
  if(newS>zm){newS=zm;newE=zm-s}
  if(newE<0){newE=0;newS=s}
  sAgo=newS;eAgo=newE;
  ed=false;rr();
  if(tab==='replay')seekReplayTo(clipOld());
}

// === TIMELINE DRAG ===
const tli=document.getElementById('tli');
function getAgoFromEvent(e){
  const r=tli.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const frac=Math.max(0,Math.min(1,(cx-r.left)/r.width));
  return fracToAgo(frac);
}
tli.addEventListener('mousedown',od);
tli.addEventListener('touchstart',od,{passive:false});
function od(e){
  if(tab!=='replay')return;
  if(e.cancelable)e.preventDefault();
  // Stop preview if playing (user is adjusting)
  if(py){py=false;try{vidR.pause()}catch(e){}if(previewTimer){clearInterval(previewTimer);previewTimer=null}}
  const touchAgo=getAgoFromEvent(e);

  if(sAgo!==null&&eAgo!==null&&dur()>=1){
    const oldA=clipOld(),newA=clipNew();
    const handleSize=Math.max(1.5,zm*0.04);  // handle grab zone
    if(Math.abs(touchAgo-oldA)<handleSize){
      dragMode='start';sAgo=oldA;eAgo=newA;
      seekReplayTo(oldA);
    }else if(Math.abs(touchAgo-newA)<handleSize){
      dragMode='end';sAgo=oldA;eAgo=newA;
      seekReplayTo(newA);
    }else if(touchAgo<oldA&&touchAgo>newA){
      dragMode='both';dragOffset=oldA-touchAgo;  // distance from touch to old edge
      seekReplayTo(touchAgo);
    }else{
      // Outside clip — start new
      sAgo=touchAgo;eAgo=Math.max(0,touchAgo-5);
      dragMode='start';
      seekReplayTo(touchAgo);
    }
  }else{
    sAgo=touchAgo;eAgo=Math.max(0,touchAgo-5);
    dragMode='start';
    seekReplayTo(touchAgo);
  }
  rr();
}
window.addEventListener('mousemove',mv);
window.addEventListener('touchmove',mv,{passive:false});
window.addEventListener('mouseup',()=>{dragMode=null});
window.addEventListener('touchend',()=>{dragMode=null});
window.addEventListener('touchcancel',()=>{dragMode=null});
function mv(e){
  if(!dragMode)return;
  if(e.cancelable)e.preventDefault();
  const touchAgo=getAgoFromEvent(e);

  if(dragMode==='start'){
    // start = older edge (larger ago). Must be > eAgo+1
    sAgo=Math.max(eAgo+1,Math.min(zm,touchAgo));
    seekReplayTo(sAgo);
  }else if(dragMode==='end'){
    // end = newer edge (smaller ago). Must be < sAgo-1
    eAgo=Math.max(0,Math.min(sAgo-1,touchAgo));
    seekReplayTo(eAgo);
  }else if(dragMode==='both'){
    const length=Math.abs(sAgo-eAgo);
    let newSAgo=touchAgo+dragOffset;  // older edge
    let newEAgo=newSAgo-length;
    if(newSAgo>zm){newSAgo=zm;newEAgo=zm-length}
    if(newEAgo<0){newEAgo=0;newSAgo=length}
    sAgo=newSAgo;eAgo=newEAgo;
    seekReplayTo((sAgo+eAgo)/2);
  }
  rr();
}

// === EXPORT ===
async function doEx(){
  if(ex||dur()<1)return;
  ex=true;rr();
  try{
    const r=await fetch(B+'/api/clip',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({startSecondsAgo:clipOld(),endSecondsAgo:clipNew()})});
    const d=await r.json();
    if(d.url){eu=B+d.url;ef=d.filename||'kutt-clip.mp4';ed=true;loadFeed()}
    else{alert(d.error||'Export failed')}
  }catch(e){alert('Export failed')}
  ex=false;rr();
}

function dlClip(){if(!eu)return;fetch(eu).then(function(r){return r.blob()}).then(function(blob){var file=new File([blob],ef,{type:'video/mp4'});if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'KUTT Replay'}).catch(function(){fbDl(blob)})}else{fbDl(blob)}}).catch(function(){window.open(eu,'_blank')})}
function fbDl(blob){var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download=ef;a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}

function kuttAgain(){ed=false;eu='';ef='';sAgo=15;eAgo=5;loadFilmstrip(true);seekReplayTo(clipOld());rr()}

function toggleLike(id){
  fetch(B+'/api/like/'+id,{method:'POST'}).then(r=>r.json()).then(d=>{
    if(d.liked)likedIds.add(id);else likedIds.delete(id);
    renderFeed();
  }).catch(()=>{
    if(likedIds.has(id))likedIds.delete(id);else likedIds.add(id);
    renderFeed();
  });
}

// === FEED RENDER / MODAL ===
var mUrl='',mFn='';
function playClip(url){
  mUrl=window.location.origin+url;mFn=url.split('/').pop();
  document.getElementById('mvid').src=mUrl;
  document.getElementById('mname').textContent=mFn.replace('.mp4','').replace(/_/g,' ');
  document.getElementById('modal').style.display='flex';
  document.getElementById('mvid').play();
}
function closeModal(){
  document.getElementById('modal').style.display='none';
  document.getElementById('mvid').pause();
  document.getElementById('mvid').src='';
}
function saveModal(){
  fetch(mUrl).then(function(r){return r.blob()}).then(function(blob){
    var file=new File([blob],mFn,{type:'video/mp4'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'KUTT Replay'}).catch(function(){fbDl(blob)})
    }else{fbDl(blob)}
  }).catch(function(){window.open(mUrl,'_blank')})
}
function renderFeed(){
  var el=document.getElementById('feed');
  if(!feedClips.length){el.innerHTML='<div class="empty-feed">No kutts yet — be the first!</div>';return}
  var html='';
  html+='<div class="feed-grid">';html+=feedClips.map(function(c){
    var liked=likedIds.has(c.id);
    var col=liked?'var(--y)':'#3a5a6a';
    return '<div class="cc" onclick="playClip(\'/clips/'+c.filename+'\')" style="cursor:pointer">'+
      '<div class="ct"><img class="cv" src="'+(c.thumb||'')+'" alt=""><div class="cd">'+(c.duration||'?')+'s</div></div>'+
      '<div class="ci-row"><div class="ci"><div class="ca">'+c.ago+'</div></div>'+
      '<button class="lk" onclick="event.stopPropagation();toggleLike(\''+c.id+'\')"><svg width="15" height="15" viewBox="0 0 24 24" fill="'+(liked?col:'none')+'" stroke="'+col+'" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="lc" style="color:'+col+'">0</span></button></div>'+
    '</div>'
  }).join('');
  html+='</div>';
  if(!feedDone&&feedClips.length<feedTotal){
    html+='<div style="text-align:center;padding:16px;opacity:.3;font-size:10px">scroll for more</div>'
  }
  el.innerHTML=html;
}

// === RENDER REPLAY ===
function rr(){
  if(tab==='live'){renderFeed();return}

  // Clip range overlay
  const cg=document.getElementById('crg');
  if(sAgo!==null&&eAgo!==null&&dur()>=0.5){
    const oldA=clipOld(),newA=clipNew();
    const leftFrac=agoToFrac(oldA);
    const rightFrac=agoToFrac(newA);
    cg.style.display='';
    cg.style.left=(leftFrac*100)+'%';
    cg.style.width=((rightFrac-leftFrac)*100)+'%';
    document.getElementById('dli').textContent=fd(dur());
  }else{cg.style.display='none'}

  // Time markers
  const mc=zm<=120?6:5;
  let mh='';
  for(let i=0;i<=mc;i++){
    const ago=zm-(i/mc)*zm;
    mh+='<span>'+(i===mc?'NOW':'-'+fs2(ago))+'</span>';
  }
  document.getElementById('tmk').innerHTML=mh;

  // Zoom buttons
  document.querySelectorAll('.zn').forEach(b=>{
    const m={'1m':60,'2m':120,'5m':300,'30m':1800};
    b.classList.toggle('a',m[b.textContent]===zm);
  });

  // Preset buttons
  const d=Math.round(dur());
  // Dynamic presets based on zoom level
  var presets=zm<=60?[5,10,20,30]:zm<=120?[5,10,20,30,60]:zm<=300?[10,30,60,120,300]:[60,120,300,600,1800];
  document.getElementById('pst').innerHTML=presets.map(s=>'<button class="pb'+(d===s?' a':'')+'" onclick="sp('+s+')">'+(s<60?s+'s':s<3600?Math.floor(s/60)+'m'+(s%60?s%60+'s':''):'30m')+'</button>').join('');

  // CTA
  const ct=document.getElementById('cta');
  if(ed){
    ct.innerHTML='<div class="sc"><div class="sk"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="st">Clip Ready!</div><div class="ss">'+fd(dur())+' · 720p</div><div class="sbt"><button class="bp" onclick="dlClip()">📲 SAVE REPLAY</button><button class="bo" onclick="kuttAgain()">KUTT ANOTHER</button></div></div>';
  }else if(dur()<1){
    ct.innerHTML='<div style="padding:14px 16px 0;text-align:center;font-size:10px;opacity:.4;letter-spacing:.06em">DRAG ON TIMELINE TO SELECT CLIP</div>';
  }else{
    const pi=py?'<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>':'<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>';
    ct.innerHTML='<div class="row"><button class="pp'+(py?' on':'')+'" onclick="togglePreview()">'+pi+'</button><div class="ri"><div class="rl">CLIP RANGE</div><div class="rv">-'+fs2(clipOld())+'<span class="ra">→</span>-'+fs2(clipNew())+'</div></div><div class="db">'+fd(dur())+'</div></div><div class="sw"><button class="sb" onclick="doEx()"'+(ex?' disabled':'')+'>'+
      (ex?'<div class="sn"></div> ENCODING…':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> SAVE REPLAY')+
    '</button></div>';
  }
}
renderFeed();
window.addEventListener('scroll',function(){
  if(feedDone||feedLoading||tab!=='live')return;
  if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-300){loadFeed(true)}
});
</script>

<div class="modal" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <video id="mvid" controls playsinline></video>
  <div class="modal-bar">
    <button class="modal-save" id="msave" onclick="saveModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> SAVE REPLAY</button>
    <button class="modal-close" onclick="closeModal()">CLOSE</button>
  </div>
  <div class="modal-name" id="mname"></div>
</div>
