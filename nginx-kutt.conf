# /etc/nginx/sites-available/kutt
#
# Reference copy — deploy with:
#   scp server/nginx-kutt.conf root@77.42.76.62:/etc/nginx/sites-available/kutt
#   ssh root@77.42.76.62 "nginx -t && systemctl reload nginx"
#
# NOTE: the `# managed by Certbot` lines below are REAL — if you re-run certbot
# it will rewrite them. Keep the structure intact.

server {
    server_name kutt.online;
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /hls/ {
        proxy_pass http://127.0.0.1:8888/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control no-cache;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3333/api/;
        proxy_set_header X-Real-IP $remote_addr;
        # Filmstrip generation can take up to ~45s cold; bump timeout.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /thumbs/ {
        proxy_pass http://127.0.0.1:3333/thumbs/;
    }

    location /clips/ {
        proxy_pass http://127.0.0.1:3333/clips/;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kutt.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kutt.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = kutt.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name kutt.online;
    return 404; # managed by Certbot
}
